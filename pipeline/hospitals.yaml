# Hospital registry for the Boston Hospital Price Transparency pipeline.
# Discovery order per hospital:
#   1. If mrf_url is set, use it directly.
#   2. Else fetch https://<domain>/cms-hpt.txt (mandated by CMS since July 2024)
#      and read the mrf-url field.
# Add hospitals by appending entries; the pipeline handles the rest.

hospitals:
  - id: mgh
    name: Massachusetts General Hospital
    system: Mass General Brigham
    domain: massgeneral.org
    city: Boston
    state: MA
    mrf_url: null   # discovered via cms-hpt.txt at runtime

  - id: bwh
    name: Brigham and Women's Hospital
    system: Mass General Brigham
    domain: brighamandwomens.org
    city: Boston
    state: MA
    mrf_url: null

  - id: bidmc
    name: Beth Israel Deaconess Medical Center
    system: Beth Israel Lahey Health
    domain: bidmc.org
    city: Boston
    state: MA
    mrf_url: null
