name: Monthly data refresh
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r pipeline/requirements.txt
      - name: Download + parse MRFs
        run: python pipeline/run_pipeline.py --download
      - name: dbt build
        working-directory: pipeline/dbt_project
        env: { DBT_PROFILES_DIR: "." }
        run: dbt deps && dbt build
      - name: Export app data
        run: python pipeline/export_json.py
      - name: Commit refreshed data
        run: |
          git config user.name "hpt-bot"
          git config user.email "actions@github.com"
          git add web/src/data data/staging/quality_scorecard.csv
          git diff --staged --quiet || git commit -m "data: monthly MRF refresh"
          git push
